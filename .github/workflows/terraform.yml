name: Terraform CD

on:
  push:
    branches: [master, main]
    paths:
      - 'infrastructure/**'
  workflow_dispatch:

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest
    environment: dev

    permissions:
      contents: read
      id-token: write

    env:
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_region: ${{ secrets.GCP_REGION }}
      TF_VAR_deploy_service_account: ${{ secrets.DEPLOY_SERVICE_ACCOUNT }}
      TF_VAR_github_repository: ${{ github.repository }}
      TF_VAR_db_connection_string: ${{ secrets.N8N_DB_CONNECTION_STRING }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.6"

      - name: Terraform Init
        run: terraform -chdir=infrastructure init

      - name: Terraform Format Check
        run: terraform -chdir=infrastructure fmt -check

      - name: Terraform Plan
        run: terraform -chdir=infrastructure plan

      - name: Terraform Apply
        run: terraform -chdir=infrastructure apply -auto-approve
